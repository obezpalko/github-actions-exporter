name: Chart Publish
on:
  push:
    branches:
      - master
    paths:
      - 'charts/**'
      - '.github/workflows/chart_release.yaml'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Validate Helm Charts
        shell: bash
        run: |
          find charts/ -type f -name 'Chart.yaml' | sed -r 's|/[^/]+$||' | sort | uniq | xargs -L 1 helm dep up
          for d in charts/*/ ; do
              helm lint --quiet "$d"
          done

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package and push Helm charts
        shell: bash
        run: |
          for d in charts/*/ ; do
              helm package "$d" -u -d /tmp/charts
          done
          for pkg in /tmp/charts/*.tgz ; do
              helm push "$pkg" oci://ghcr.io/obezpalko/charts
          done
